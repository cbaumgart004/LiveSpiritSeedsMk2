fragment SettingsParts on Settings {
  __typename
  siteTitle
  tagline
  logo
  theme
  contactEmail
}

fragment PageParts on Page {
  __typename
  title
  navLabel
  order
  showInNav
  blocks {
    __typename
    ... on PageBlocksSplitSection {
      title
      body
      image
      imageSide
      buttons {
        __typename
        label
        url
      }
    }
    ... on PageBlocksStackedSection {
      title
      body
      buttons {
        __typename
        label
        url
      }
    }
    ... on PageBlocksServiceCard {
      title
      description
      image
      imageSide
      bookingOptions {
        __typename
        label
        bookUrl
        note
      }
    }
    ... on PageBlocksValuesSection {
      title
      words
    }
    ... on PageBlocksEventSection {
      title
      body
      images
      buttons {
        __typename
        label
        url
      }
    }
  }
}
