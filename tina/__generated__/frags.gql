fragment SettingsParts on Settings {
  __typename
  siteTitle
  tagline
  logo
  theme
  uiStyle
  navCtaLabel
  navCtaUrl
  previewLink
  contactEmail
}

fragment PageParts on Page {
  __typename
  title
  navLabel
  order
  showInNav
  blocks {
    __typename
    ... on PageBlocksContentSection {
      layout
      title
      eyebrow
      body
      image
      taglinePlacement
      taglineBlend
      overlayAlign
      imageSide
      imageWidth
      images
      cards {
        __typename
        image
        title
        description
        buttonLabel
        buttonUrl
      }
      words
      spacing
      buttons {
        __typename
        label
        url
        status
        service
      }
      showHomeButton
    }
    ... on PageBlocksService {
      title
      description
      image
      imageSide
      imageWidth
      status
      bookingOptions {
        __typename
        label
        bookUrl
        note
        addOns {
          __typename
          service
          bookUrl
        }
      }
      spacing
      buttons {
        __typename
        label
        url
        status
        service
      }
      showHomeButton
    }
    ... on PageBlocksEmbed {
      title
      source
      mode
      url
      code
      height
      caption
      spacing
      showHomeButton
    }
  }
}
